{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "kite-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kite-service.labels" . | nindent 4 }}
spec:
  groups:
    - name: kite-service.recordings
      interval: 30s
      rules:
        - record: kite:http_requests:rate5m
          expr: |
            sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}"}[5m])) by (namespace, method, path, status)

        - record: kite:http_requests:error_rate5m
          expr: |
            sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="{{ .Release.Namespace }}"}[5m]))

        - record: kite:http_request_duration_seconds:p50
          expr: |
            histogram_quantile(0.50,
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])) by (le, namespace)
            )

        - record: kite:http_request_duration_seconds:p95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])) by (le, namespace)
            )

        - record: kite:http_request_duration_seconds:p99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}"}[5m])) by (le, namespace)
            )

    - name: kite-service.alerts
      rules:
        - alert: KiteHighErrorRate
          expr: kite:http_requests:error_rate5m > 0.05
          for: 2m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High 5xx error rate in {{ `{{ $labels.namespace }}` }}"
            description: >
              {{ `{{ $labels.namespace }}` }} error rate is {{ `{{ $value | humanizePercentage }}` }}
              over the last 5 minutes (threshold: 5%).

        - alert: KiteHighLatencyP95
          expr: kite:http_request_duration_seconds:p95 > 1
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Elevated p95 latency in {{ `{{ $labels.namespace }}` }}"
            description: >
              p95 request latency is {{ `{{ $value | humanizeDuration }}` }} in {{ `{{ $labels.namespace }}` }}
              (threshold: 1s).

        - alert: KiteHighLatencyP99
          expr: kite:http_request_duration_seconds:p99 > 2
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Critical p99 latency in {{ `{{ $labels.namespace }}` }}"
            description: >
              p99 latency is {{ `{{ $value | humanizeDuration }}` }} in {{ `{{ $labels.namespace }}` }}
              (threshold: 2s). Investigate immediately.

        - alert: KitePodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{
              namespace="{{ .Release.Namespace }}",
              container="kite-service"
            }[5m]) * 60 > 1
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod {{ `{{ $labels.pod }}` }} is crash-looping"
            description: >
              {{ `{{ $labels.pod }}` }} has restarted more than once per minute for the past 5 minutes.

        - alert: KiteDeploymentUnavailable
          expr: |
            kube_deployment_status_replicas_unavailable{
              namespace="{{ .Release.Namespace }}",
              deployment="kite-service"
            } > 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "{{ `{{ $labels.deployment }}` }} has unavailable replicas"
            description: >
              {{ `{{ $value }}` }} replica(s) unavailable in {{ .Release.Namespace }} for more than 5 minutes.
{{- end }}
