image:
  repository: "123456789012.dkr.ecr.us-east-1.amazonaws.com/dev/kite-service"
  tag: ""  # bumped by CD workflow on every merge to main

replicaCount: 1

ingress:
  enabled: true
  hosts:
    - host: kite-dev.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
