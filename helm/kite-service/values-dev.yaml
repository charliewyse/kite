image:
  repository: "charliewyse/kite-service"
  tag: "0.0.1"  # bumped by CD workflow on every semver tag

replicaCount: 1

ingress:
  enabled: true
  hosts:
    - host: kite-dev.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
