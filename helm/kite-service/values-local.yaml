# Local minikube overrides — layer on top of values.yaml + values-{env}.yaml.
# Image settings (repository, tag, pullPolicy: Never) live in the env values
# files so ArgoCD picks them up without needing this file.
#
# This file only disables add-ons that require cloud infrastructure:
#   - autoscaling (no metrics-server configured)
#
# Direct helm install:
#   helm install kite-service ./helm/kite-service -n kite-dev --create-namespace \
#     -f helm/kite-service/values.yaml \
#     -f helm/kite-service/values-dev.yaml \
#     -f helm/kite-service/values-local.yaml

autoscaling:
  enabled: false
