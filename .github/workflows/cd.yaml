name: CD

on:
  # Auto-trigger for dev after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Manual promotion to staging or prod
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [staging, prod]
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234)"
        required: true
        type: string

jobs:
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    # Only run when CI succeeded (not on manual dispatch)
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Derive image tag from triggering run
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "value=sha-${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Bump image tag in values-dev.yaml
        run: |
          yq -i '.image.tag = "${{ steps.tag.outputs.value }}"' \
            helm/kite-service/values-dev.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/kite-service/values-dev.yaml
          git commit -m "chore(cd): bump dev image to ${{ steps.tag.outputs.value }} [skip ci]"
          git push

  promote:
    name: Promote → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.environment }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Bump image tag in values-${{ inputs.environment }}.yaml
        run: |
          yq -i '.image.tag = "${{ inputs.image_tag }}"' \
            helm/kite-service/values-${{ inputs.environment }}.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/kite-service/values-${{ inputs.environment }}.yaml
          git commit -m "chore(cd): promote ${{ inputs.image_tag }} to ${{ inputs.environment }} [skip ci]"
          git push
