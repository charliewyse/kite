# AppProject scopes all kite Applications to this repo and these namespaces.
# Apply once: kubectl apply -n argocd -f gitops/argocd/appproject.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kite
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Kite microservice — all environments

  # Only allow deployments sourced from these repositories
  sourceRepos:
    - https://github.com/charliewyse/kite
    - https://prometheus-community.github.io/helm-charts

  # Only allow deployments into these namespaces
  destinations:
    - server: https://kubernetes.default.svc
      namespace: kite-dev
    - server: https://kubernetes.default.svc
      namespace: kite-staging
    - server: https://kubernetes.default.svc
      namespace: kite-prod
    - server: https://kubernetes.default.svc
      namespace: monitoring
    # argocd namespace is needed so the app-of-apps can manage Application CRs
    - server: https://kubernetes.default.svc
      namespace: argocd

  # Cluster-scoped resources this project is allowed to create.
  # kube-prometheus-stack installs CRDs, ClusterRoles, and webhook configs.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration

  # All namespace-scoped resource kinds are permitted within the destinations above
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Prevent accidental orphaned resources when an Application is deleted
  orphanedResources:
    warn: true
