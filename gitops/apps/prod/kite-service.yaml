apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kite-service-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: kite-service
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-deployed.slack: releases
spec:
  project: kite

  source:
    repoURL: https://github.com/charliewyse/kite
    targetRevision: main
    path: helm/kite-service
    helm:
      releaseName: kite-service
      valueFiles:
        - values.yaml
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kite-prod

  syncPolicy:
    # Prod requires explicit human sync — no automation, no surprises.
    # Promotion flow:
    #   1. Run: make release VERSION=x.y.z  (bumps values-prod.yaml and pushes)
    #   2. Engineer reviews the diff in the ArgoCD UI and clicks Sync
    #      or: argocd app sync kite-service-prod
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  ignoreDifferences:
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /spec/currentMetrics
        - /spec/metrics
